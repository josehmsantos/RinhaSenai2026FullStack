name: PR CI

on:
  pull_request_target:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      team: ${{ steps.team.outputs.team }}
      dir: ${{ steps.team.outputs.dir }}
      skip: ${{ steps.team.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect team
        id: team
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- participants/ | head -1)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Nenhum participante modificado"
            exit 0
          fi
          TEAM=$(echo "$CHANGED" | cut -d'/' -f2)
          if [ -d "participants/$TEAM" ] && [ -f "participants/$TEAM/package.json" ]; then
            echo "team=$TEAM" >> "$GITHUB_OUTPUT"
            echo "dir=participants/$TEAM" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Team: $TEAM"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Participante $TEAM sem package.json"
          fi

      - name: Validate info.json
        if: steps.team.outputs.skip != 'true'
        run: |
          TEAM="${{ steps.team.outputs.team }}"
          DIR="${{ steps.team.outputs.dir }}"
          node -e "
            const fs = require('fs');
            const info = JSON.parse(fs.readFileSync('$DIR/info.json', 'utf8'));
            const errors = [];
            if (info.team !== '$TEAM') errors.push('team nao bate com pasta');
            if (!Array.isArray(info.members) || info.members.length < 1) errors.push('members vazio');
            (info.members || []).forEach(m => {
              if (!m.name || !m.github?.startsWith('@')) errors.push('membro invalido: ' + JSON.stringify(m));
            });
            if (errors.length) { errors.forEach(e => console.error(e)); process.exit(1); }
            console.log('info.json OK: team=' + info.team + ', ' + info.members.length + ' membros');
          "

      - name: Validate package.json
        if: steps.team.outputs.skip != 'true'
        run: |
          node -e "
            const pkg = require('./${{ steps.team.outputs.dir }}/package.json');
            if (!pkg.scripts?.build || !pkg.scripts?.start) { console.error('scripts build/start faltando'); process.exit(1); }
            console.log('package.json OK');
          "

      - name: Check forbidden files
        run: |
          BAD=$(git diff --name-only origin/main...HEAD 2>/dev/null | grep -E '(node_modules/|\.db$)' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Arquivos proibidos: $BAD"
            exit 1
          fi

      - name: Install + Build + Start + Health
        if: steps.team.outputs.skip != 'true'
        working-directory: ${{ steps.team.outputs.dir }}
        timeout-minutes: 3
        run: |
          rm -f package-lock.json
          npm install
          npm run build
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health > /dev/null 2>&1 && break
            [ $i -eq 30 ] && echo "::error::Server timeout" && exit 1
            sleep 1
          done
          curl -sf http://localhost:3000/ > /dev/null || (echo "::error::Frontend nao servido" && exit 1)
          echo "Validacao OK"
          kill %1 2>/dev/null || true

  bench:
    needs: validate
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install participant
        working-directory: ${{ needs.validate.outputs.dir }}
        run: |
          rm -f data.db data.db-* package-lock.json
          npm install
          npm run build

      - name: Install tests (Playwright)
        working-directory: tests
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Start server
        working-directory: ${{ needs.validate.outputs.dir }}
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health > /dev/null 2>&1 && echo "Server ready" && exit 0
            sleep 1
          done
          echo "::error::Server timeout" && exit 1

      - name: Run tests
        id: bench
        continue-on-error: true
        run: node --test tests/run.js

      - name: Post results
        if: steps.app-token.outputs.token && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const team = '${{ needs.validate.outputs.team }}';

            let results;
            try {
              results = JSON.parse(fs.readFileSync('tests/results.json', 'utf8'));
            } catch {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## ❌ Testes falharam: ${team}\n\nOs testes nao conseguiram gerar resultados. Verifique os logs.`
              });
              return;
            }

            const { pass, fail, total } = results.summary;
            const scoring = results.scoring || {};
            const metrics = results.metrics || {};
            const status = fail === 0 ? '✅' : '⚠️';
            const totalScore = scoring.total || 0;

            function renderCategory(title, items, scoreInfo) {
              if (!items || items.length === 0) return '';
              const failing = items.filter(t => !t.ok);
              const passing = items.filter(t => t.ok);
              const scoreLabel = scoreInfo ? ` (${scoreInfo.score}/${scoreInfo.max} pts)` : '';

              let md = `\n### ${title}${scoreLabel}\n\n`;

              if (failing.length > 0) {
                md += `**❌ Falhas (${failing.length}):**\n`;
                for (const t of failing) {
                  md += `- ❌ ${t.name}`;
                  if (t.detail) md += ` — \`${t.detail}\``;
                  md += '\n';
                }
                md += '\n';
              }

              if (passing.length > 0 && failing.length > 0) {
                md += `<details>\n<summary>✅ ${passing.length} testes passando</summary>\n\n`;
                for (const t of passing) md += `- ✅ ${t.name}\n`;
                md += `\n</details>\n`;
              } else if (passing.length > 0) {
                md += `<details>\n<summary>✅ ${passing.length}/${items.length} testes passando</summary>\n\n`;
                for (const t of passing) {
                  md += `- ✅ ${t.name}`;
                  if (t.detail) md += ` *(${t.detail})*`;
                  md += '\n';
                }
                md += `\n</details>\n`;
              }
              return md;
            }

            let body = `## ${status} Resultado: ${team}\n\n`;
            body += `### Pontuacao: **${totalScore}/100**\n\n`;
            body += `| Categoria | Testes | Pontos |\n`;
            body += `|-----------|--------|--------|\n`;
            body += `| Regras de negocio | ${scoring.rules?.pass || 0}/${scoring.rules?.total || 0} | **${scoring.rules?.score || 0}/50** |\n`;
            body += `| Frontend (Playwright) | ${scoring.frontend?.pass || 0}/${scoring.frontend?.total || 0} | **${scoring.frontend?.score || 0}/30** |\n`;
            body += `| Stress test | ${scoring.stress?.pass || 0}/${scoring.stress?.total || 0} | **${scoring.stress?.score || 0}/20** |\n`;
            body += `| **Total** | **${pass}/${total}** | **${totalScore}/100** |\n`;

            if (metrics.throughput) {
              body += `\n### Performance\n\n`;
              body += `| Metrica | Valor |\n`;
              body += `|---------|-------|\n`;
              body += `| Throughput | **${metrics.throughput} txn/s** |\n`;
              body += `| Total | **${metrics.stress_created}/${metrics.stress_total} txns** em ${metrics.stress_elapsed_ms}ms |\n`;
              body += `| Latencia avg | **${metrics.latency_avg_ms || '-'}ms** |\n`;
              body += `| Latencia p50 | **${metrics.latency_p50_ms || '-'}ms** |\n`;
              body += `| Latencia p95 | **${metrics.latency_p95_ms || '-'}ms** |\n`;
              body += `| Latencia p99 | **${metrics.latency_p99_ms || '-'}ms** |\n`;
            }

            body += renderCategory('Regras de negocio (API)', results.rules, scoring.rules);
            body += renderCategory('Frontend (Playwright)', results.frontend, scoring.frontend);
            body += renderCategory('Stress test', results.stress, scoring.stress);
            body += `\n---\n> 🤖 Testes automaticos · Rinha FullStack SENAI 2026\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail if tests have errors
        if: steps.bench.outcome != 'success'
        run: |
          echo "::error::Testes falharam — merge bloqueado"
          exit 1
