name: PR Validate

on:
  pull_request_target:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect team
        id: team
        run: |
          for dir in participants/*/; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              TEAM=$(basename "$dir")
              echo "team=$TEAM" >> "$GITHUB_OUTPUT"
              echo "dir=participants/$TEAM" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "Team: $TEAM"
              exit 0
            fi
          done
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "Nenhum participante encontrado"

      - name: Validate info.json
        if: steps.team.outputs.skip != 'true'
        run: |
          TEAM="${{ steps.team.outputs.team }}"
          DIR="${{ steps.team.outputs.dir }}"
          node -e "
            const fs = require('fs');
            const info = JSON.parse(fs.readFileSync('$DIR/info.json', 'utf8'));
            const errors = [];
            if (info.team !== '$TEAM') errors.push('team nao bate com pasta');
            if (!Array.isArray(info.members) || info.members.length < 1) errors.push('members vazio');
            (info.members || []).forEach(m => {
              if (!m.name || !m.github?.startsWith('@')) errors.push('membro invalido: ' + JSON.stringify(m));
            });
            if (errors.length) { errors.forEach(e => console.error(e)); process.exit(1); }
            console.log('info.json OK: team=' + info.team + ', ' + info.members.length + ' membros');
          "

      - name: Validate package.json
        if: steps.team.outputs.skip != 'true'
        run: |
          node -e "
            const pkg = require('./${{ steps.team.outputs.dir }}/package.json');
            if (!pkg.scripts?.build || !pkg.scripts?.start) { console.error('scripts build/start faltando'); process.exit(1); }
            console.log('package.json OK');
          "

      - name: Check forbidden files
        run: |
          BAD=$(git diff --name-only origin/main...HEAD 2>/dev/null | grep -E '(node_modules/|\.db$)' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Arquivos proibidos: $BAD"
            exit 1
          fi

      - name: Install + Build + Start + Health
        if: steps.team.outputs.skip != 'true'
        working-directory: ${{ steps.team.outputs.dir }}
        timeout-minutes: 3
        run: |
          rm -f package-lock.json
          npm install
          npm run build
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health > /dev/null 2>&1 && break
            [ $i -eq 30 ] && echo "::error::Server timeout" && exit 1
            sleep 1
          done
          curl -sf http://localhost:3000/ > /dev/null || (echo "::error::Frontend nao servido" && exit 1)
          echo "Validacao OK"
          kill %1 2>/dev/null || true
